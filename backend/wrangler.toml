name = "five-elements-smoky-bookings"
main = "src/worker.js"
compatibility_date = "2026-07-01"

[[d1_databases]]
binding = "DB"
database_name = "five-elements-smoky-bookings"
database_id = "315dc4a6-b28b-4db7-b25d-01ec54727922"

[vars]
ALLOWED_ORIGIN = "https://5esmoky.github.io"
SITE_URL = "https://5esmoky.github.io/home/"
PUBLIC_API_URL = "https://five-elements-smoky-bookings.workers.dev"
PRICE_CALENDAR_URL = "https://5esmoky.github.io/home/price-calendar.js"
OWNER_EMAIL = "fiveelementssmoky@gmail.com"
EMAIL_PROVIDER = "apps_script"
MIN_NIGHTS = "3"
CLEANING_FEE_CENTS = "45000"
PET_FEE_CENTS = "15000"
STR_TAX_RATE = "0.1275"
PAYMENT_WINDOW_HOURS = "24"
# Use "disabled" now. Change to "truvi" after Truvi API onboarding is complete.
VERIFICATION_MODE = "disabled"

# Add secrets with `wrangler secret put NAME`:
# STRIPE_SECRET_KEY, STRIPE_WEBHOOK_SECRET,
# TURNSTILE_SECRET_KEY, TRUVI_API_KEY, TRUVI_CREATE_BOOKING_URL,
# TRUVI_WEBHOOK_SECRET, CALENDAR_API_URL, CALENDAR_COMMAND_TOKEN.
